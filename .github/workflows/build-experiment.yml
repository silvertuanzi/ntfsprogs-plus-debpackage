name: Build Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: 'recursive'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper automake autoconf libtool pkgconf libgcrypt20-dev libgnutls28-dev libhd-dev libblkid-dev

      - name: Build package
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Rename Ubuntu build artifact
        run: |
          mv ../*.deb ../ntfsprogs-plus_${{ github.ref_name }}_ubuntu_amd64.deb
      
      - name: Upload .deb to release
        uses: softprops/action-gh-release@v3
        with:
          files: ../*.deb
          body: |
            ### Ubuntu build
            Built on Ubuntu 22.04 LTS and is expected to work on Ubuntu 22.04+.
          
          append_body: true
          overwrite_files: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}