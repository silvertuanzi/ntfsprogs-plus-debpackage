name: Build Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: 'recursive'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper automake autoconf libtool pkgconf libgcrypt20-dev libgnutls28-dev

      - name: Build package
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v3
        with:
          files: ../*.deb
          body: |
            ### Ubuntu 22.04 build (recommended)
            Built on Ubuntu 22.04 LTS.
            This package only depends on libc6 at runtime and is expected to work on Ubuntu 22.04+, Ubuntu 24.04+, and Debian 12+.
            This is the primary build provided by this project.
            
            ### Debian 12 build (testing)
            Built on Debian 12 Bookworm.
            This build is provided mainly to verify compatibility with Debian's toolchain and packaging environment.
            Unless you specifically need it, the Ubuntu 22.04 build above is the recommended package.
            
            Automated build for tag ${{ github.ref_name }}
          overwrite_files: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}